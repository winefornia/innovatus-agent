app = "winefornia-agent"
primary_region = "sjc"

[build]

[processes]
  web = "uvicorn app.main:app --host 0.0.0.0 --port 8080"
  tastingroom_watcher = "python scripts/tastingroom_mail_watcher.py"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

  # Health check so Fly restarts a wedged web machine (deadlocked event loop,
  # OOM-recovered-but-broken, etc.). /health is dependency-free — it never
  # touches Supabase/LLM/Gmail — so it flips red only on a true process wedge,
  # not on a downstream outage we want to ride out.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  # 512mb OOM-killed under langgraph + google-adk + litellm + anthropic +
  # supabase + google-api-client all resident. 1GB gives headroom + buffer.
  memory = "1024mb"
