app = "winefornia-agent"
# Co-located with Supabase us-east-1 (N. Virginia) to minimize checkpointer
# round-trip latency — sjc (US-west) added ~70ms/query cross-country, which
# inflated Postgres timeouts and pushed the Google Chat webhook toward its 30s deadline.
primary_region = "iad"

[build]

[processes]
  web = "uvicorn app.main:app --host 0.0.0.0 --port 8080"
  bot = "python bot.py"
  tastingroom_bot = "python tastingroom_bot.py"
  tastingroom_watcher = "python scripts/tastingroom_mail_watcher.py"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
