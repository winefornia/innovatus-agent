app = "winefornia-agent"
primary_region = "sjc"

[build]

[processes]
  web = "uvicorn app.main:app --host 0.0.0.0 --port 8080"
  bot = "python bot.py"
  tastingroom_watcher = "python scripts/tastingroom_mail_watcher.py"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
